# =========================
# NETWORKING TUNING
# =========================
- name: Configure networking for kubernetes
  hosts: all
  become: true
  any_errors_fatal: true

  vars_files:
    - ../../vars/common.yaml

  tasks:
    - name: Allow INPUT guard rules
      ansible.builtin.iptables:
        chain: INPUT
        state: present
        protocol: "{{ item.protocol | default(omit) }}"
        destination_port: "{{ item.port | default(omit) }}"
        in_interface: "{{ item.in_interface | default(omit) }}"
        destination: "{{ item.destination | default(omit) }}"
        source: "{{ item.source | default(omit) }}"
        rule_num: "{{ item.rule_num | default(omit) }}"
        jump: ACCEPT
      loop: "{{ iptables_rules }}"
      notify: Save IPTables

    - name: Remove FLANNEL-FWD from FORWARD if present
      ansible.builtin.command: iptables -D FORWARD -j FLANNEL-FWD
      ignore_errors: true
      changed_when: false

    - name: Detect IPVS reject rule in INPUT
      ansible.builtin.command: iptables -C INPUT -j KUBE-IPVS-FILTER
      register: ipvs_filter_present
      ignore_errors: true
      changed_when: false

    - name: Remove IPVS filter from INPUT if detected
      ansible.builtin.command: iptables -D INPUT -j KUBE-IPVS-FILTER
      when:
        - inventory_hostname in groups['control_plane']
        - ipvs_filter_present.rc == 0

    - name: Install IPVS watchdog service
      ansible.builtin.copy:
        dest: /usr/local/sbin/ipvs-watchdog.sh
        mode: '0755'
        content: |
          #!/bin/bash
          if iptables -C INPUT -j KUBE-IPVS-FILTER &>/dev/null; then
            iptables -D INPUT -j KUBE-IPVS-FILTER
          fi

    - name: Cron IPVS watchdog
      ansible.builtin.cron:
        name: "ipvs watchdog"
        job: "/usr/local/sbin/ipvs-watchdog.sh"
        minute: "*/1"

    - name: Configure conntrack sysctl tuning
      ansible.builtin.copy:
        dest: /etc/sysctl.d/98-conntrack.conf
        mode: '0644'
        content: |
          net.netfilter.nf_conntrack_max=262144
          net.netfilter.nf_conntrack_tcp_timeout_syn_recv=30

    - name: Apply conntrack sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

  handlers:
    - name: Save IPTables
      ansible.builtin.apt:
        name: iptables-persistent
        state: present
        update_cache: true
    # - name: Save IPTables
    #   ansible.builtin.command: iptables-save --file /etc/iptables/rules.v4