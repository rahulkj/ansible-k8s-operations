---
- name: Destroy Kubernetes cluster and clean all nodes
  hosts: all
  become: true
  any_errors_fatal: true

  vars_files:
    - ../vars/common.yaml

  tasks:
    # --------------------------------------------------
    # Pre-flight: stop services if present
    # --------------------------------------------------
    - name: Stop kubelet if running
      ansible.builtin.systemd:
        name: kubelet
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Stop containerd if running
      ansible.builtin.systemd:
        name: containerd
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Unmount containerd mounts
      ansible.builtin.shell: |
        mount | grep containerd | awk '{print $3}' | xargs -r umount -lf
      ignore_errors: true

    # --------------------------------------------------
    # Reset kubeadm (safe even if not initialized)
    # --------------------------------------------------
    - name: Reset kubeadm
      ansible.builtin.command: kubeadm reset -f
      ignore_errors: true

    # --------------------------------------------------
    # Remove Kubernetes manifests and state
    # --------------------------------------------------
    - name: Remove Kubernetes directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ cleanup_dirs}}"

    # --------------------------------------------------
    # Flush iptables & IPVS (critical)
    # --------------------------------------------------
    - name: Flush iptables
      ansible.builtin.shell: |
        iptables -F
        iptables -t nat -F
        iptables -t mangle -F
        iptables -X
      changed_when: false

    - name: Reset IPVS tables
      ansible.builtin.command: ipvsadm --clear
      ignore_errors: true

    # --------------------------------------------------
    # Delete all container images & containers
    # --------------------------------------------------
    - name: Start containerd temporarily (for cleanup)
      ansible.builtin.systemd:
        name: containerd
        state: started
      ignore_errors: true

    - name: Delete all containers (crictl)
      ansible.builtin.shell: |
        crictl ps -aq | xargs -r crictl rm -f
      ignore_errors: true
      changed_when: false

    - name: Delete all images (crictl)
      ansible.builtin.shell: |
        crictl images -q | xargs -r crictl rmi
      ignore_errors: true
      changed_when: false

    - name: Stop containerd after cleanup
      ansible.builtin.systemd:
        name: containerd
        state: stopped
      ignore_errors: true

    # --------------------------------------------------
    # Remove packages
    # --------------------------------------------------
    - name: Unhold Kubernetes packages
      ansible.builtin.command: apt-mark unhold kubelet kubeadm kubectl
      changed_when: false
      ignore_errors: true

    - name: Purge Kubernetes packages
      ansible.builtin.apt:
        name: "{{ k8s_packages }}"
        state: absent
        purge: yes
        autoremove: yes

    - name: Purge required packages
      ansible.builtin.apt:
        name: "{{ required_packages }}"
        state: absent
        purge: yes
        autoremove: yes

    - name: Remove base packages
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: absent
        purge: yes
        autoremove: yes

    # --------------------------------------------------
    # Remove apt repos & keys
    # --------------------------------------------------
    - name: Remove Kubernetes apt repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/kubernetes.list
        state: absent

    - name: Remove Kubernetes apt keyring
      ansible.builtin.file:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        state: absent

    # --------------------------------------------------
    # Final cleanup
    # --------------------------------------------------
    - name: Remove configs
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ cleanup_configs}}"

    - name: Unload Flannel-related kernel modules
      become: true
      ansible.builtin.modprobe:
        name: "{{ item }}"
        state: absent
      loop: "{{ kernel_modules}}"
      failed_when: false

    # --------------------------------------------------
    # Remove cgroups settings 
    # --------------------------------------------------
    - name: Remove cgroups configuration
      become: true
      shell: |
        FILE=""
        for f in /boot/cmdline.txt /boot/firmware/cmdline.txt /boot/firmware/current/cmdline.txt; do
          [ -f "$f" ] && FILE="$f"
        done

        if [ -n "$FILE" ]; then
          awk '{
            for (i=1; i<=NF; i++) {
              if ($i != "cgroup_enable=cpuset" &&
                  $i != "cgroup_enable=memory" &&
                  $i != "cgroup_memory=1") {
                printf "%s%s", $i, (i<NF ? OFS : ORS)
              }
            }
          }' $FILE > /tmp/cmdline.txt && mv /tmp/cmdline.txt $FILE
        fi
      changed_when: false

    - name: Cleanup INPUT guard rules
      ansible.builtin.shell: |
        if iptables -C INPUT {{ item }} &>/dev/null; then
          iptables -D INPUT {{ item }}
        fi
      loop:
        - "-i lo -j ACCEPT"
        - "-p tcp --dport 22 -j ACCEPT"
        - "-p tcp --dport 6443 -j ACCEPT"
        - "-d {{ ansible_facts['default_ipv4']['address'] }} -j ACCEPT"
      ignore_errors: true 
      changed_when: true

    - name: Cleanup FLANNEL-FWD jump from FORWARD
      ansible.builtin.command: iptables -D FORWARD -j FLANNEL-FWD
      ignore_errors: true
      changed_when: false

    - name: Remove IPVS watchdog script
      ansible.builtin.file:
        path: /usr/local/sbin/ipvs-watchdog.sh
        state: absent

    - name: Remove IPVS watchdog cron job
      ansible.builtin.cron:
        name: "ipvs watchdog"
        state: absent

    # --------------------------------------------------
    # Detect reboot requirement
    # --------------------------------------------------
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: Accumulate reboot requirement (apt)
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_required | default(true) or reboot_flag.stat.exists }}"

- import_playbook: ../modules/linux/reboot.yaml
