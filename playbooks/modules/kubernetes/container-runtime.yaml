# =========================
# CONTAINER RUNTIME - CONTAINERD
# =========================
- name: Install containerd and Kubernetes packages
  hosts: all
  become: true
  any_errors_fatal: true

  vars_files:
    - ../vars/common.yaml

  tasks:
    # --------------------------------------------------
    # Base packages (single apt transaction)
    # --------------------------------------------------
    - name: Install base packages
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: yes
      loop: "{{ base_packages }}"

    # --------------------------------------------------
    # Containerd configuration (correct + idempotent)
    # --------------------------------------------------

    - name: Ensure containerd config directory exists
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Check if containerd config exists
      ansible.builtin.stat:
        path: /etc/containerd/config.toml
      register: containerd_config_stat

    - name: Generate default containerd config
      ansible.builtin.command: containerd config default
      register: containerd_config
      changed_when: true
      when: not containerd_config_stat.stat.exists

    - name: Write containerd config
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        content: "{{ containerd_config.stdout }}"
        mode: "0644"
      when: not containerd_config_stat.stat.exists

    - name: Ensure SystemdCgroup is set in runc options (aligned)
      ansible.builtin.blockinfile:
        path: /etc/containerd/config.toml
        marker: "# {mark} ANSIBLE SYSTEMD CGROUP"
        insertafter: '^\s*ShimCgroup\s*='
        block: |
          SystemdCgroup = true
      notify: Restart containerd

    - name: Verify containerd cgroup driver
      ansible.builtin.command: containerd config dump
      register: containerd_dump
      changed_when: false

    - ansible.builtin.assert:
        that:
          - "'SystemdCgroup = true' in containerd_dump.stdout"
        fail_msg: "containerd is NOT using systemd cgroups"

    # --------------------------------------------------
    # crictl configuration (clean + idempotent)
    # --------------------------------------------------
    - name: Configure crictl
      ansible.builtin.copy:
        dest: /etc/crictl.yaml
        mode: "0644"
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 2
          debug: true
          pull-image-on-create: false

    # --------------------------------------------------
    # Reboot detection (correct)
    # --------------------------------------------------
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_flag

    - name: Accumulate reboot requirement
      ansible.builtin.set_fact:
        reboot_required: "{{ reboot_required | default(false) or reboot_flag.stat.exists }}"

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true