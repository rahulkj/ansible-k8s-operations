base_packages:
  - containerd
  - containernetworking-plugins
  - curl
  - apt-transport-https
  - nfs-common
  - ipvsadm
  - net-tools
  - jq
  - snapd

required_packages:
  - ca-certificates
  - curl
  - gnupg

k8s_packages:
  - kubelet
  - kubeadm
  - kubectl

cleanup_dirs:
  - /etc/kubernetes
  - /var/lib/kubelet
  - /var/lib/etcd
  - /var/lib/cni
  - /etc/cni
  - /opt/cni
  - /run/flannel
  - /run/containerd
  - /var/run/kubernetes

cleanup_configs:
  - /etc/containerd
  - /etc/crictl.yaml
  - /etc/sysctl.d/99-kubernetes-cri.conf
  - /etc/sysctl.d/99-disable-ipv6.conf
  - /etc/sysctl.d/98-conntrack.conf
  - /etc/iptables/rules.v4
  - /etc/modules-load.d/k8s-flannel.conf

kernel_modules:
  - br_netfilter
  - overlay
  - ip_vs
  - ip_vs_rr
  - ip_vs_wrr
  - ip_vs_sh

iptables_rules:
  - { port: 22,   comment: "Allow SSH access" }
  - { port: 6443, comment: "Allow Kubernetes API server" }

ubuntu_clis:
  - git
  - vim
  - unzip
  - uuid-runtime
  - iputils-ping
  - dnsutils
  - ca-certificates
  - netcat-traditional
  - telnet
  - gnupg2
  - curl
  - wget
  - jq
  - nmap
  - tree
  - watch
  - direnv
  - zsh
  - net-tools