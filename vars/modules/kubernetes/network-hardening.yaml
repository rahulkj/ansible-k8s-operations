# =========================
# NETWORKING TUNING
# =========================
- name: Configure networking for kubernetes
  hosts: control_plane
  become: true
  any_errors_fatal: true

  vars_files:
    - ../../vars/common.yaml

  tasks:
    - name: Allow loopback traffic (INPUT)
      ansible.builtin.iptables:
        chain: INPUT
        in_interface: lo
        jump: ACCEPT
        rule_num: 1
        state: present

    - name: Allow loopback traffic (OUTPUT)
      ansible.builtin.iptables:
        chain: OUTPUT
        out_interface: lo
        jump: ACCEPT
        rule_num: 1
        state: present
    
    - name: Install iptables-persistent
      ansible.builtin.apt:
        name: iptables-persistent
        state: present
        update_cache: true

    - name: Ensure SSH and Kubernetes API ports are allowed
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ item.port }}"
        jump: ACCEPT
        comment: "{{ item.comment }}"
        state: present
      loop: "{{ iptables_rules }}"
      notify: Save IPTables

    - name: Remove FLANNEL-FWD from FORWARD if present
      ansible.builtin.command: iptables -D FORWARD -j FLANNEL-FWD
      ignore_errors: true
      changed_when: false

    - name: Insert FLANNEL-FWD at top of FORWARD chain
      ansible.builtin.iptables:
        chain: FORWARD
        jump: FLANNEL-FWD
        rule_num: 1
        state: present

    - name: Allow pod CIDR source traffic
      ansible.builtin.iptables:
        chain: INPUT
        source: 10.244.0.0/16
        jump: ACCEPT
        rule_num: 1
        state: present

    - name: Allow pod CIDR destination traffic
      ansible.builtin.iptables:
        chain: INPUT
        destination: 10.244.0.0/16
        jump: ACCEPT
        rule_num: 1
        state: present

    - name: Save iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: false

    - name: Configure conntrack sysctl tuning
      ansible.builtin.copy:
        dest: /etc/sysctl.d/98-conntrack.conf
        mode: '0644'
        content: |
          net.netfilter.nf_conntrack_max=262144
          net.netfilter.nf_conntrack_tcp_timeout_syn_recv=30

    - name: Apply conntrack sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

  handlers:
    - name: Save IPTables
      ansible.builtin.command: iptables-save --file /etc/iptables/rules.v4